<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AirTrack{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/footer.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/datatables.min.css') }}">
    {% block extra_styles %}{% endblock %}
</head>
<body>
    {% include 'header.html' %}
    <main class="container-fluid mt-3">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/datatables.min.js') }}"></script>
    {% block extra_scripts %}{% endblock %}

{% if gorilla_alert %}
<div id="gorilla-overlay" onclick="this.style.display='none'">
    <img src="{{ url_for('static', filename='images/github_gorilla_popup.png') }}" id="gorilla-img">
    <p class="gorilla-dismiss">[ click anywhere to dismiss ]</p>
</div>
<style>
#gorilla-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 10, 0, 0.96);
    background-image: repeating-linear-gradient(
        0deg,
        transparent, transparent 2px,
        rgba(0, 255, 0, 0.025) 2px, rgba(0, 255, 0, 0.025) 4px
    );
    z-index: 99999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}
#gorilla-img {
    max-width: min(900px, 92vw);
    max-height: 88vh;
    border: 1px solid #00cc00;
    box-shadow: 0 0 60px rgba(0, 200, 0, 0.25), 0 0 120px rgba(0, 100, 0, 0.15);
}
.gorilla-dismiss {
    color: #00cc00;
    font-family: monospace;
    font-size: 0.75rem;
    margin-top: 12px;
    opacity: 0.6;
    letter-spacing: 0.1em;
}
</style>
{% endif %}
</body>
</html>
